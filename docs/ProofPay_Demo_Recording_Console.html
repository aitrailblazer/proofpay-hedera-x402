<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Step-by-step Lit presenter console for recording the ProofPay Hedera x402 bounty demo in under five minutes.">
  <title>ProofPay Demo Recording Console</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg:#07090d; --panel:#12171d; --panel2:#171e26; --line:#303943;
      --text:#f4f0e8; --muted:#a9afb3; --green:#64e0b6; --gold:#f1c766;
      --amber:#ffae57; --red:#ff6f78; --blue:#75bfff;
    }
    * { box-sizing:border-box }
    html,body { margin:0; min-height:100%; background:var(--bg); color:var(--text) }
    body { background:radial-gradient(circle at 8% 0,rgba(100,224,182,.12),transparent 28rem),radial-gradient(circle at 92% 8%,rgba(241,199,102,.10),transparent 25rem),var(--bg) }
    proofpay-demo-console:not(:defined) { display:block; width:min(1240px,calc(100vw - 32px)); margin:auto; padding:28px 0 }
    a { color:var(--gold) }
  </style>
</head>
<body>
  <proofpay-demo-console>
    <h1>ProofPay Demo Recording Console</h1>
    <p>The Lit presenter surface is loading. The recording contract remains available in the embedded XML.</p>
  </proofpay-demo-console>

  <script id="proofpay-demo-recording-contract" type="application/xml">
<StrategiXVisualSpec id="proofpay-demo-recording-console" version="1.0" status="recording-ready" canonicalFormat="html">
  <CanonicalArtifact>
    <Title>ProofPay Hedera x402 Demo Recording Console</Title>
    <Repository>https://github.com/aitrailblazer/proofpay-hedera-x402</Repository>
    <Path>docs/ProofPay_Demo_Recording_Console.html</Path>
    <UpdatedAt>2026-07-21</UpdatedAt>
    <Owner>DeltaSignal ProofPay</Owner>
  </CanonicalArtifact>
  <Purpose>Guide one safe, technically complete, judge-focused screen recording that remains below the Hedera bounty five-minute limit.</Purpose>
  <SystemOrProductContract>
    <TargetDurationSeconds>250</TargetDurationSeconds>
    <WarningThresholdSeconds>270</WarningThresholdSeconds>
    <HardLimitSeconds>299</HardLimitSeconds>
    <PaymentNetwork>hedera:testnet</PaymentNetwork>
    <PaymentScheme>exact</PaymentScheme>
    <PaymentAsset entityId="0.0.0">HBAR</PaymentAsset>
    <SecretBoundary>Never reveal Azure Key Vault values, wallet private keys, environment dumps, shell history, or complete process environments.</SecretBoundary>
  </SystemOrProductContract>
  <DataOrAPIContract>
    <Command id="preflight">npm run check</Command>
    <Command id="purchase">npm run demo:keyvault</Command>
    <Command id="verify">npm run verify -- docs/evidence/proof-bundle-2026-07-21.json docs/evidence/proofpay-receipt-public-key.pem</Command>
    <Command id="tamper">npm run demo:tamper</Command>
    <HashScanUrl>https://hashscan.io/testnet/transaction/0.0.7162784-1784665192-906989595</HashScanUrl>
    <ProofIndexUrl>https://github.com/aitrailblazer/proofpay-hedera-x402/blob/main/docs/ProofPay_Submission_Proof_Index.html</ProofIndexUrl>
  </DataOrAPIContract>
  <Workflow targetSeconds="250">
    <Step id="opening" seconds="20">State the payment-to-artifact integrity problem and ProofPay thesis.</Step>
    <Step id="architecture" seconds="25">Explain Codex, HTTP 402, Blocky402, Hedera, evidence delivery, and signed receipt.</Step>
    <Step id="preflight" seconds="20">Show the public repository and passing test state without exposing local configuration.</Step>
    <Step id="live-payment" seconds="65">Run the Key Vault-backed autonomous purchase and identify the five terminal phases.</Step>
    <Step id="hashscan" seconds="35">Open the Hedera transaction and show successful settlement and transfers.</Step>
    <Step id="verification" seconds="40">Run offline verification and identify the payment, request, artifact, and signature checks.</Step>
    <Step id="tamper" seconds="25">Mutate the public evidence copy and show deterministic rejection.</Step>
    <Step id="close" seconds="20">Connect ProofPay to DeltaSignal pay-per-evidence and show the public proof index.</Step>
  </Workflow>
  <Diagrams>
    <Diagram id="runtime-flow" direction="left-to-right">
      <Node>Codex agent</Node><Node>HTTP 402 resource server</Node><Node>Blocky402 facilitator</Node><Node>Hedera testnet</Node><Node>Signed evidence receipt</Node>
    </Diagram>
  </Diagrams>
  <AcceptanceCriteria>
    <Criterion>Recording duration is 299 seconds or less.</Criterion>
    <Criterion>Video visibly shows an end-to-end x402 request, payment, Hedera transaction, evidence unlock, and verification.</Criterion>
    <Criterion>At least one HashScan transaction URL is visible and included in the submission.</Criterion>
    <Criterion>No private key, Azure secret value, API key, bearer token, or environment dump appears.</Criterion>
    <Criterion>The public repository, MIT license, and proof index are visible.</Criterion>
    <Criterion>The final video URL is tested in a logged-out browser before form submission.</Criterion>
  </AcceptanceCriteria>
  <DecisionLog>
    <Decision date="2026-07-21">Use a 4:10 scripted target to retain 49 seconds of safety margin.</Decision>
    <Decision date="2026-07-21">Use the existing successful public proof bundle for deterministic offline verification and tamper rejection.</Decision>
    <Decision date="2026-07-21">Do not add HCS, mainnet, HTS receipt tokens, or live DeltaSignal backend work to the mandatory recording path.</Decision>
  </DecisionLog>
  <RisksAndOpenQuestions>
    <Risk severity="critical">Accidentally exposing secret values while navigating Azure or the terminal.</Risk>
    <Risk severity="high">Recording exceeds five minutes because of narration or browser loading.</Risk>
    <Risk severity="medium">A fresh facilitator or mirror-node delay interrupts the live purchase.</Risk>
    <Mitigation>Record with the committed proof bundle and prior HashScan transaction available as deterministic fallback evidence.</Mitigation>
  </RisksAndOpenQuestions>
  <SourceDigest>
    <Source>https://hedera.com/x402-bounty/</Source>
    <Source>https://docs.hedera.com/solutions/ai/x402</Source>
    <Source>README.md</Source>
    <Source>docs/ProofPay_Submission_Proof_Index.html</Source>
    <Source>docs/evidence/proof-bundle-2026-07-21.json</Source>
  </SourceDigest>
  <ImplementationNotes>The Lit UI stores rehearsal progress locally in the browser, offers keyboard navigation, and never reads credentials or invokes payment commands itself.</ImplementationNotes>
</StrategiXVisualSpec>
  </script>

  <script type="module">
    import {LitElement, html, css} from "https://unpkg.com/lit@3/index.js?module";

    const HASHSCAN = "https://hashscan.io/testnet/transaction/0.0.7162784-1784665192-906989595";
    const REPO = "https://github.com/aitrailblazer/proofpay-hedera-x402";
    const PROOF_INDEX = `${REPO}/blob/main/docs/ProofPay_Submission_Proof_Index.html`;
    const steps = [
      {
        id:"opening", time:20, title:"Open with the missing proof", screen:"Recording console · hero",
        say:"Agents can already pay APIs. The missing layer is proving exactly what a payment unlocked. ProofPay binds a real Hedera x402 settlement to the request, evidence, delivered output, and software version.",
        cue:"Keep this to three sentences. Do not explain Hedera history.",
        command:""
      },
      {
        id:"architecture", time:25, title:"Show the six-part flow", screen:"Runtime flow band below",
        say:"Codex requests issuer evidence. The server returns HTTP 402. Codex signs an HBAR transfer. Blocky402 sponsors the network fee and settles on Hedera. Only then does ProofPay unlock the evidence and issue a signed receipt.",
        cue:"Point left to right. Emphasize that the facilitator cannot move funds without the buyer signature.",
        command:""
      },
      {
        id:"preflight", time:20, title:"Establish public and reproducible", screen:"Terminal in repository",
        say:"The implementation is public, MIT licensed, and covered by build, mirror verification, replay, receipt, persistence, and tamper tests.",
        cue:"Run this before recording if time is tight; during the final take, showing the last PASS line is sufficient.",
        command:"npm run check"
      },
      {
        id:"live-payment", time:65, title:"Run the autonomous purchase", screen:"Terminal · large font",
        say:"This launcher reads credentials directly from Azure Key Vault without printing them. Watch the agent discover the catalog, create a single-use quote, satisfy HTTP 402, settle on Hedera, mirror-verify the transfer, unlock MSTR evidence, and verify the proof bundle.",
        cue:"Never run env, printenv, set, az keyvault secret show, or shell history while recording.",
        command:"npm run demo:keyvault"
      },
      {
        id:"hashscan", time:35, title:"Prove the payment on Hedera", screen:"HashScan transaction page",
        say:"HashScan independently shows the successful Hedera testnet transaction. The buyer paid the exact quoted amount to the separate seller, while the facilitator sponsored the network fee.",
        cue:"Show status, timestamp, transfers, and transaction ID. Avoid unrelated account navigation.",
        command:""
      },
      {
        id:"verification", time:40, title:"Prove what the payment unlocked", screen:"Terminal · verifier output",
        say:"HashScan proves value moved. This verifier additionally checks the trusted signer, quote, payment terms, request, encrypted payload, decrypted artifact, evidence hash, output hash, and settlement claims.",
        cue:"Pause briefly on ok true and the empty errors array.",
        command:"npm run verify -- docs/evidence/proof-bundle-2026-07-21.json docs/evidence/proofpay-receipt-public-key.pem"
      },
      {
        id:"tamper", time:25, title:"Demonstrate fail-closed integrity", screen:"Terminal · tamper command",
        say:"Now I change one field in a temporary copy of the delivered evidence. ProofPay deterministically rejects it because the artifact and evidence hashes no longer match the signed receipt.",
        cue:"The script does not modify the committed proof bundle.",
        command:"npm run demo:tamper"
      },
      {
        id:"close", time:20, title:"Close on durable DeltaSignal value", screen:"Public proof index",
        say:"ProofPay turns DeltaSignal into pay-per-evidence infrastructure for autonomous agents: no subscription, no API key, real Hedera settlement, and an independently verifiable record of exactly what was delivered.",
        cue:"Finish on the public repository, proof bundle, and HashScan link. Stop recording immediately.",
        command:""
      }
    ];

    const flow = ["Codex agent","HTTP 402","Blocky402","Hedera","Evidence unlock","Signed receipt"];
    const fmt = value => `${String(Math.floor(value / 60)).padStart(2,"0")}:${String(Math.floor(value % 60)).padStart(2,"0")}`;

    class ProofPayDemoConsole extends LitElement {
      static properties = {
        active:{state:true}, elapsed:{state:true}, running:{state:true},
        complete:{state:true}, presenter:{state:true}, copied:{state:true}
      };
      static styles = css`
        :host{display:block;min-height:100vh}
        button,a.action{font:inherit}.wrap{width:min(1240px,calc(100vw - 28px));margin:auto;padding:20px 0 54px}
        .top{position:sticky;top:0;z-index:20;display:grid;grid-template-columns:1fr auto auto;gap:16px;align-items:center;
          padding:12px 16px;margin-bottom:14px;border:1px solid var(--line);border-radius:14px;background:rgba(7,9,13,.94);backdrop-filter:blur(16px)}
        .brand{display:flex;align-items:center;gap:10px}.mark{width:12px;height:12px;border-radius:50%;background:var(--green);box-shadow:0 0 24px var(--green)}
        .brand b{letter-spacing:.02em}.brand span{color:var(--muted);font-size:12px}.timer{font:900 32px ui-monospace;letter-spacing:-.06em;color:var(--green)}
        .timer.warn{color:var(--amber)}.timer.over{color:var(--red)}.controls{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
        button,.action{border:1px solid var(--line);border-radius:9px;padding:9px 12px;background:#171d24;color:var(--text);cursor:pointer;text-decoration:none}
        button:hover,.action:hover{border-color:var(--gold)}button.primary{background:var(--green);border-color:var(--green);color:#06110d;font-weight:850}
        button.danger{color:var(--red)}.hero,.panel,.current{border:1px solid var(--line);border-radius:16px;background:rgba(18,23,29,.93);box-shadow:0 20px 60px #0004}
        .hero{padding:24px;margin-bottom:14px}.eyebrow{font:800 11px ui-monospace;letter-spacing:.13em;text-transform:uppercase;color:var(--green)}
        h1{font-size:clamp(34px,5vw,62px);line-height:.98;letter-spacing:-.05em;margin:8px 0 13px;max-width:880px}
        .hero p{color:var(--muted);max-width:820px;font-size:16px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:18px}
        .metric{border:1px solid var(--line);border-radius:10px;padding:12px;background:#0b0f14}.metric span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
        .metric b{display:block;margin-top:5px;font:850 20px ui-monospace}.green{color:var(--green)}.gold{color:var(--gold)}.red{color:var(--red)}
        .flow{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin:14px 0}.node{position:relative;text-align:center;padding:12px 8px;border:1px solid #40505a;border-radius:10px;background:#101820;font-size:12px;font-weight:750}
        .node:not(:last-child)::after{content:"→";position:absolute;right:-10px;color:var(--gold);z-index:2}
        .workspace{display:grid;grid-template-columns:310px 1fr;gap:14px}.panel{padding:14px}.panel h2{font-size:14px;margin:0 0 12px;color:var(--gold)}
        .stepList{display:grid;gap:7px}.stepBtn{width:100%;display:grid;grid-template-columns:30px 1fr auto;gap:8px;text-align:left;align-items:center;padding:10px}
        .stepBtn.active{border-color:var(--green);background:#10251f}.stepBtn.done .num{background:var(--green);color:#06110d}.num{display:grid;place-items:center;width:26px;height:26px;border-radius:50%;background:#28313a;font:800 12px ui-monospace}
        .stepTitle{font-size:12px;font-weight:750}.stepTime{color:var(--muted);font:750 11px ui-monospace}.current{padding:22px;min-height:470px}
        .currentHead{display:flex;justify-content:space-between;gap:12px;align-items:start}.current h2{font-size:clamp(25px,4vw,42px);line-height:1.05;margin:6px 0 8px}
        .screen{color:var(--blue);font:750 12px ui-monospace}.budget{text-align:right}.budget b{font:900 28px ui-monospace;color:var(--gold)}.budget span{display:block;color:var(--muted);font-size:10px;text-transform:uppercase}
        .script{margin:20px 0;padding:20px;border-left:4px solid var(--green);border-radius:0 12px 12px 0;background:#0b1314;font-size:clamp(18px,2.2vw,26px);line-height:1.36}
        .cue{padding:12px 14px;border:1px solid #624c25;background:#211b10;border-radius:10px;color:#f3d49a}.command{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:14px}
        pre{margin:0;padding:14px;background:#05080b;border:1px solid #27313a;border-radius:10px;white-space:pre-wrap;overflow:auto;color:#dbe8df;font:750 13px ui-monospace}
        .nav{display:flex;justify-content:space-between;gap:8px;margin-top:18px}.nav div{display:flex;gap:8px}.check{background:var(--green);color:#06110d;border-color:var(--green);font-weight:850}
        .safety{margin-top:14px;border:1px solid #743943;background:#241217;border-radius:12px;padding:14px}.safety b{color:var(--red)}.safety ul{margin:8px 0 0;padding-left:20px;color:#e3b8bc}
        .footerGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}.links{display:flex;flex-wrap:wrap;gap:8px}.kbd{display:inline-block;border:1px solid #56616b;border-bottom-width:3px;border-radius:5px;padding:1px 6px;background:#10151b;font:700 11px ui-monospace}
        details{margin-top:14px;color:var(--muted)}details pre{margin-top:10px;max-height:360px;font-size:11px}.presenter .hero,.presenter .footerGrid,.presenter .safety,.presenter .flow{display:none}
        .presenter .workspace{grid-template-columns:220px 1fr}.presenter .current{min-height:calc(100vh - 110px)}.presenter .script{font-size:clamp(24px,3vw,38px)}
        @media(max-width:850px){.top{grid-template-columns:1fr auto}.controls{grid-column:1/-1;justify-content:flex-start}.metrics{grid-template-columns:1fr 1fr}.flow{grid-template-columns:1fr 1fr}.node::after{display:none}.workspace{grid-template-columns:1fr}.stepList{grid-template-columns:1fr 1fr}.footerGrid{grid-template-columns:1fr}.presenter .workspace{grid-template-columns:1fr}}
        @media(max-width:520px){.metrics,.stepList{grid-template-columns:1fr}.currentHead{display:block}.budget{text-align:left;margin-top:10px}.command{grid-template-columns:1fr}.timer{font-size:26px}}
      `;
      constructor(){
        super();
        const stored=JSON.parse(localStorage.getItem("proofpay-demo-progress")||"{}");
        this.active=stored.active??0; this.elapsed=stored.elapsed??0; this.complete=stored.complete??[];
        this.running=false; this.presenter=false; this.copied=""; this.tick=null; this.last=0;
        this.keyHandler=e=>{
          if(["INPUT","TEXTAREA"].includes(e.target?.tagName))return;
          if(e.code==="Space"){e.preventDefault();this.toggleTimer()}
          if(e.key==="ArrowRight")this.next();
          if(e.key==="ArrowLeft")this.previous();
          if(e.key.toLowerCase()==="c")this.markComplete();
        };
      }
      connectedCallback(){super.connectedCallback();window.addEventListener("keydown",this.keyHandler)}
      disconnectedCallback(){window.removeEventListener("keydown",this.keyHandler);this.stopTick();super.disconnectedCallback()}
      persist(){localStorage.setItem("proofpay-demo-progress",JSON.stringify({active:this.active,elapsed:this.elapsed,complete:this.complete}))}
      startTick(){this.last=performance.now();this.tick=setInterval(()=>{const now=performance.now();this.elapsed+=(now-this.last)/1000;this.last=now;this.persist();this.requestUpdate()},200)}
      stopTick(){if(this.tick)clearInterval(this.tick);this.tick=null}
      toggleTimer(){this.running=!this.running;this.running?this.startTick():this.stopTick()}
      reset(){if(!confirm("Reset timer and all completed steps?"))return;this.stopTick();this.running=false;this.elapsed=0;this.active=0;this.complete=[];this.persist()}
      select(i){this.active=Math.max(0,Math.min(steps.length-1,i));this.persist()}
      next(){this.select(this.active+1)}
      previous(){this.select(this.active-1)}
      markComplete(){if(!this.complete.includes(this.active))this.complete=[...this.complete,this.active];this.persist();this.next()}
      async copy(text,id){await navigator.clipboard.writeText(text);this.copied=id;setTimeout(()=>{this.copied=""},1400)}
      render(){
        const s=steps[this.active], planned=steps.reduce((n,x)=>n+x.time,0), progress=Math.min(100,(this.elapsed/299)*100);
        const timerClass=this.elapsed>299?"over":this.elapsed>270?"warn":"";
        const xml=document.getElementById("proofpay-demo-recording-contract")?.textContent?.trim()??"";
        return html`<main class="wrap ${this.presenter?"presenter":""}">
          <section class="top">
            <div class="brand"><span class="mark"></span><div><b>ProofPay Recording Console</b><span> · Hedera x402 bounty</span></div></div>
            <div class="timer ${timerClass}" aria-label="recording timer">${fmt(this.elapsed)}</div>
            <div class="controls">
              <button class="primary" @click=${this.toggleTimer}>${this.running?"Pause":"Start timer"}</button>
              <button @click=${()=>this.presenter=!this.presenter}>${this.presenter?"Exit presenter":"Presenter mode"}</button>
              <button class="danger" @click=${this.reset}>Reset</button>
            </div>
          </section>

          <section class="hero">
            <div class="eyebrow">Recording ready · target 04:10 · hard stop 04:59</div>
            <h1>Prove what the agent paid for.</h1>
            <p>Follow the eight beats exactly. The console keeps narration concise, commands copyable, and secret boundaries visible while preserving 49 seconds of deadline margin.</p>
            <div class="metrics">
              <div class="metric"><span>Scripted duration</span><b class="green">${fmt(planned)}</b></div>
              <div class="metric"><span>Warning</span><b class="gold">04:30</b></div>
              <div class="metric"><span>Hard stop</span><b class="red">04:59</b></div>
              <div class="metric"><span>Completed beats</span><b>${this.complete.length} / ${steps.length}</b></div>
            </div>
          </section>

          <section class="flow" aria-label="ProofPay runtime flow">
            ${flow.map(x=>html`<div class="node">${x}</div>`)}
          </section>

          <section class="workspace">
            <aside class="panel">
              <h2>Recording beats</h2>
              <div class="stepList">
                ${steps.map((x,i)=>html`<button class="stepBtn ${i===this.active?"active":""} ${this.complete.includes(i)?"done":""}" @click=${()=>this.select(i)}>
                  <span class="num">${this.complete.includes(i)?"✓":i+1}</span><span class="stepTitle">${x.title}</span><span class="stepTime">${x.time}s</span>
                </button>`)}
              </div>
              <details><summary>Keyboard controls</summary><p><span class="kbd">Space</span> timer · <span class="kbd">←</span>/<span class="kbd">→</span> steps · <span class="kbd">C</span> complete</p></details>
            </aside>

            <article class="current">
              <div class="currentHead">
                <div><div class="eyebrow">Beat ${this.active+1} of ${steps.length}</div><h2>${s.title}</h2><div class="screen">SHOW: ${s.screen}</div></div>
                <div class="budget"><b>${s.time}s</b><span>beat budget</span></div>
              </div>
              <div class="script">“${s.say}”</div>
              <div class="cue"><b>Director cue:</b> ${s.cue}</div>
              ${s.command?html`<div class="command"><pre>${s.command}</pre><button @click=${()=>this.copy(s.command,s.id)}>${this.copied===s.id?"Copied":"Copy command"}</button></div>`:""}
              ${s.id==="hashscan"?html`<div class="links" style="margin-top:14px"><a class="action" href=${HASHSCAN} target="_blank" rel="noreferrer">Open verified HashScan transaction ↗</a></div>`:""}
              ${s.id==="close"?html`<div class="links" style="margin-top:14px"><a class="action" href=${REPO} target="_blank" rel="noreferrer">Public repository ↗</a><a class="action" href=${PROOF_INDEX} target="_blank" rel="noreferrer">Proof index ↗</a></div>`:""}
              <div class="nav">
                <button ?disabled=${this.active===0} @click=${this.previous}>← Previous</button>
                <div><button class="check" @click=${this.markComplete}>Mark complete + next</button><button ?disabled=${this.active===steps.length-1} @click=${this.next}>Next →</button></div>
              </div>
              <div style="height:4px;background:#252d35;border-radius:8px;margin-top:20px;overflow:hidden"><div style="height:100%;width:${progress}%;background:${this.elapsed>270?"var(--red)":"var(--green)"}"></div></div>
            </article>
          </section>

          <section class="safety">
            <b>Never show during recording</b>
            <ul><li>Azure Key Vault secret values or secret-show output</li><li>Hedera private keys, environment dumps, shell history, or bearer tokens</li><li>Personal browser tabs, account pages, notifications, or unrelated terminal history</li></ul>
          </section>

          <section class="footerGrid">
            <div class="panel"><h2>Before pressing Record</h2><ol>
              <li>Use a clean desktop and disable notifications.</li><li>Set terminal font to at least 18px.</li><li>Open this console, the repository, and HashScan only.</li>
              <li>Confirm <code>az account show</code> succeeds without displaying secrets.</li><li>Rehearse once; reset this console before the final take.</li>
            </ol></div>
            <div class="panel"><h2>Submission finish line</h2><ol>
              <li>Export at 1080p and confirm duration ≤ 04:59.</li><li>Upload as public or unlisted.</li><li>Test the URL in a private browser.</li>
              <li>Add URL and duration to the proof index.</li><li>Submit at <a href="https://forms.gle/oWbifBqkvbk2oANC7" target="_blank" rel="noreferrer">the official form</a>.</li>
            </ol></div>
          </section>
          <details class="panel"><summary>Embedded machine-readable recording contract</summary><pre>${xml}</pre></details>
        </main>`;
      }
    }
    customElements.define("proofpay-demo-console",ProofPayDemoConsole);
  </script>
</body>
</html>
