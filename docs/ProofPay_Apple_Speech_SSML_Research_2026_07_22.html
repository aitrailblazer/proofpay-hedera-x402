  <title>ProofPay Apple Speech and SSML Research</title>
  <meta name="description" content="Evidence-backed Apple-only narration plan for the ProofPay Hedera x402 demo.">
  <style>
    html{background:#07090d;color:#f5f1e8;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.45}
    body{margin:0;min-height:100vh}apple-speech-research:not(:defined){display:block;padding:32px}
  </style>
</head>
<body>
  <apple-speech-research></apple-speech-research>

  <script id="apple-speech-contract" type="application/xml">
<ProofPayAppleSpeechResearch version="1.0" date="2026-07-22" status="verified">
  <CanonicalArtifact>
    <Path>docs/ProofPay_Apple_Speech_SSML_Research_2026_07_22.html</Path>
    <Owner>DeltaSignal</Owner>
    <Target>ProofPay Hedera x402 YouTube narration</Target>
    <Machine>iMac M4</Machine>
    <OperatingSystem>macOS 26.5.1 build 25F80</OperatingSystem>
  </CanonicalArtifact>
  <Purpose>Replace mechanical compact-Samantha phrase synthesis with an Apple-only, local, higher-quality SSML narration workflow.</Purpose>
  <Findings>
    <Finding severity="critical">The installed Samantha voice is com.apple.voice.compact.en-US.Samantha and AVSpeechSynthesisVoice reports quality default.</Finding>
    <Finding severity="critical">Every installed English voice currently reports default quality; no enhanced or premium English voice is installed.</Finding>
    <Finding severity="high">The existing build invokes the say CLI once per phrase, resetting linguistic and acoustic context at every phrase boundary.</Finding>
    <Finding severity="high">Modern AVSpeechUtterance supports an SSML initializer on macOS 13 and later.</Finding>
    <Finding severity="medium">The say CLI does not accept SSML; it supports legacy MacinTalk double-bracket commands such as slnc, emph, rate, pitch, number, phoneme, and TUNE controls.</Finding>
  </Findings>
  <VerifiedAppleCapabilities>
    <Capability api="AVSpeechUtterance.init(ssmlRepresentation:)">Accepts W3C-style SSML and returns nil for invalid XML.</Capability>
    <Capability api="AVSpeechSynthesisVoice.quality">Distinguishes default, enhanced, and premium assets.</Capability>
    <Capability api="AVSpeechSynthesizer.write(_:toBufferCallback:)">Renders synthesized speech into local audio buffers for deterministic offline files.</Capability>
    <Capability api="AVSpeechUtterance">Provides rate, pitchMultiplier, volume, preUtteranceDelay, and postUtteranceDelay.</Capability>
    <Capability api="AVSpeechSynthesisIPANotationAttribute">Provides IPA pronunciation control for attributed utterances.</Capability>
    <Capability api="AVSpeechSynthesizerDelegate">Reports spoken text ranges for synchronization and highlighting.</Capability>
  </VerifiedAppleCapabilities>
  <LocalSSMLTests voice="compact Samantha">
    <Test name="plain" durationSeconds="2.098141" result="PASS"/>
    <Test name="break-1000ms" durationSeconds="3.073379" result="PASS"/>
    <Test name="prosody-slow" durationSeconds="2.727075" result="PASS"/>
    <Test name="prosody-fast" durationSeconds="1.078231" result="PASS"/>
    <Test name="emphasis-strong" durationSeconds="2.098141" result="ACCEPTED"/>
    <Test name="say-as-characters" durationSeconds="3.656871" result="PASS"/>
    <Test name="phoneme-ipa" durationSeconds="1.018413" result="PASS"/>
    <AudioFormat codec="pcm_f32le" sampleRate="22050" channels="1"/>
  </LocalSSMLTests>
  <SystemOrProductContract>
    <Requirement>Download and select an enhanced or premium English voice before final synthesis.</Requirement>
    <Requirement>Fail the build if the selected voice quality is default.</Requirement>
    <Requirement>Use AVFoundation Swift rather than say for final SSML rendering.</Requirement>
    <Requirement>Render one coherent scene utterance, not one synthesizer invocation per caption phrase.</Requirement>
    <Requirement>Use punctuation, break, prosody, say-as, and phoneme controls conservatively.</Requirement>
    <Requirement>Derive caption and action timing from rendered audio or synthesizer callbacks.</Requirement>
    <Requirement>Normalize to one continuous 48 kHz audio timeline before final AAC encoding.</Requirement>
  </SystemOrProductContract>
  <DataOrAPIContract>
    <Input format="SSML XML">One scene document with spoken text, cadence controls, and pronunciation controls.</Input>
    <Voice selector="identifier">An installed AVSpeechSynthesisVoice whose quality is enhanced or premium.</Voice>
    <Intermediate format="PCM">AVSpeechSynthesizer buffer output, retained losslessly before mastering.</Intermediate>
    <Output format="WAV">48 kHz mono mastered narration aligned to the video timeline.</Output>
  </DataOrAPIContract>
  <Workflow>
    <Step order="1">Open System Settings, Accessibility, Read &amp; Speak, voice menu, Manage Voices.</Step>
    <Step order="2">Download an English enhanced or premium voice and preview several candidates.</Step>
    <Step order="3">Run the voice inventory and verify quality is enhanced or premium.</Step>
    <Step order="4">Rewrite each scene as one SSML utterance with natural punctuation and restrained controls.</Step>
    <Step order="5">Render locally with AVSpeechSynthesizer.write.</Step>
    <Step order="6">Capture word or range timing for captions and action highlights.</Step>
    <Step order="7">Resample, master, concatenate, encode, and verify the continuous audio timeline.</Step>
  </Workflow>
  <AcceptanceCriteria>
    <Criterion>The chosen voice reports enhanced or premium quality.</Criterion>
    <Criterion>No phrase is synthesized by a separate say process in the final narration.</Criterion>
    <Criterion>Hedera, HTTP 402, HBAR, Blocky402, x402, DeltaSignal, account IDs, and transaction IDs have approved pronunciation.</Criterion>
    <Criterion>Blind A/B review prefers the new voice for naturalness, intelligibility, cadence, and trust.</Criterion>
    <Criterion>Captions and NOW highlights align with the actual rendered speech.</Criterion>
    <Criterion>Final MP4 audio starts at zero, reaches the final frame, and has no packet gap above one millisecond.</Criterion>
  </AcceptanceCriteria>
  <DecisionLog>
    <Decision date="2026-07-22">Use modern AVFoundation SSML as the primary Apple-only path.</Decision>
    <Decision date="2026-07-22">Treat legacy say embedded commands as a fallback, not the final professional pipeline.</Decision>
    <Decision date="2026-07-22">Do not use Personal Voice unless the owner explicitly wants their own vocal identity and authorizes application access.</Decision>
  </DecisionLog>
  <RisksAndOpenQuestions>
    <Risk>Apple does not document every supported SSML element and voice-specific behavior; test the selected voice rather than assuming full W3C parity.</Risk>
    <Risk>Enhanced and premium voice availability varies by language, OS release, and downloaded assets.</Risk>
    <Risk>Personal Voice is an accessibility identity-preservation feature, not automatically a studio narration upgrade.</Risk>
    <Risk>Excessive prosody and emphasis markup can sound less natural than well-punctuated text.</Risk>
  </RisksAndOpenQuestions>
  <SourceDigest>
    <Source id="apple-ssml">https://developer.apple.com/documentation/avfaudio/avspeechutterance/init(ssmlrepresentation:)-8zam9</Source>
    <Source id="apple-voice-quality">https://developer.apple.com/documentation/avfaudio/avspeechsynthesisvoicequality</Source>
    <Source id="apple-write-audio">https://developer.apple.com/documentation/avfaudio/avspeechsynthesizer/write(_:tobuffercallback:)</Source>
    <Source id="apple-read-speak">https://support.apple.com/guide/mac-help/hear-your-mac-read-documents-mh27448/mac</Source>
    <Source id="apple-legacy-tuning">https://developer.apple.com/library/archive/documentation/UserExperience/Conceptual/SpeechSynthesisProgrammingGuide/FineTuning/FineTuning.html</Source>
    <Source id="local-man-page">macOS say(1) manual, dated 2020-08-13</Source>
    <Source id="local-probe">AVFoundation Swift probes executed on macOS 26.5.1 on 2026-07-22</Source>
  </SourceDigest>
  <ImplementationNotes>
    <Note>AVSpeechUtterance SSML support was introduced on macOS 13.</Note>
    <Note>AVSpeechSynthesizer output from compact Samantha was 22.05 kHz mono float PCM in the local probe; resample only after lossless capture.</Note>
    <Note>The final script should reject a missing voice identifier instead of silently falling back to the system default.</Note>
  </ImplementationNotes>
</ProofPayAppleSpeechResearch>
  </script>

  <script type="module">
    import {LitElement,html,css} from "https://unpkg.com/lit@3/index.js?module";
    const xml=document.getElementById("apple-speech-contract")?.textContent.trim()??"";
    const findings=[
      ["Current voice","Samantha is compact/default","The installed identifier is com.apple.voice.compact.en-US.Samantha."],
      ["Missing asset","No enhanced or premium English voice","Every installed English voice reports default quality."],
      ["Modern path","AVFoundation supports SSML","AVSpeechUtterance has accepted SSML since macOS 13."],
      ["Root cadence issue","One say process per phrase","Prosody context restarts at every phrase boundary."]
    ];
    const flow=["Download premium voice","Verify quality","Author scene SSML","Render one scene","Capture timings","Master PCM","Encode YouTube MP4"];
    class AppleSpeechResearch extends LitElement{
      static styles=css`
        :host{display:block;min-height:100vh;background:radial-gradient(circle at 15% 0,rgba(99,224,181,.12),transparent 32%),radial-gradient(circle at 90% 8%,rgba(242,198,101,.1),transparent 28%),#07090d}
        main{width:min(1180px,calc(100vw - 32px));margin:auto;padding:34px 0 60px}.hero,.panel,.card{border:1px solid #28333d;background:rgba(15,20,26,.94);border-radius:16px}.hero{padding:28px}.eyebrow{color:#63e0b5;font:800 12px ui-monospace;letter-spacing:.14em;text-transform:uppercase}h1{font-size:clamp(34px,5vw,62px);line-height:1;margin:10px 0 14px;letter-spacing:-.045em}h2{margin:0 0 12px;color:#f2c665}p,li{color:#aeb7bc}.verdict{font-size:19px;color:#f5f1e8}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:16px}.card{padding:18px}.card b{display:block;color:#f2c665;margin-bottom:6px}.card span{font-weight:800}.card p{margin:8px 0 0;font-size:13px}.panel{padding:22px;margin-top:16px}.flow{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}.step{padding:12px;border:1px solid #31594b;border-radius:10px;background:#0c1d17;color:#dff9ef;font-size:12px}.tests{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.test{padding:12px;border-radius:10px;background:#0b1117;border:1px solid #26343f}.test b{display:block;color:#63e0b5}.warning{border-color:#70582d;background:#211b10}.code{white-space:pre-wrap;overflow:auto;background:#040608;border-radius:10px;padding:16px;color:#d9f4e8;font:12px/1.5 ui-monospace;max-height:440px}a{color:#73bfff}@media(max-width:850px){.grid,.flow,.tests{grid-template-columns:1fr}}
      `;
      render(){return html`<main>
        <section class="hero"><div class="eyebrow">ProofPay · Apple-only voice research · verified 22 July 2026</div><h1>The missing quality upgrade is already on the Mac.</h1><p class="verdict">Use an <b>Enhanced or Premium Apple voice</b> through <b>AVFoundation SSML</b>, render a whole scene at once, and synchronize visuals from the resulting audio. The current compact Samantha plus phrase-by-phrase <code>say</code> process is the mechanical-sounding path.</p></section>
        <section class="grid">${findings.map(([a,b,c])=>html`<article class="card"><b>${a}</b><span>${b}</span><p>${c}</p></article>`)}</section>
        <section class="panel"><h2>Recommended production flow</h2><div class="flow">${flow.map((x,i)=>html`<div class="step">${i+1}. ${x}</div>`)}</div></section>
        <section class="panel"><h2>SSML verified locally</h2><div class="tests"><div class="test"><b>Break</b>+0.975 sec from a 1000 ms mark</div><div class="test"><b>Prosody slow</b>2.727 sec vs 2.098 plain</div><div class="test"><b>Prosody fast</b>1.078 sec vs 2.098 plain</div><div class="test"><b>Pronunciation</b>say-as characters and IPA accepted</div></div></section>
        <section class="panel warning"><h2>Important boundary</h2><p>The <code>say</code> CLI has Apple’s older <code>[[slnc 400]]</code>, <code>[[emph +]]</code>, rate, pitch, phoneme, and TUNE commands. Those are not XML. Modern SSML belongs to <code>AVSpeechUtterance(ssmlRepresentation:)</code>. Apple does not promise that every W3C SSML element behaves identically across every downloaded voice, so acceptance must be tested against the exact voice identifier.</p></section>
        <section class="panel"><h2>First action on this iMac</h2><p>Open <b>System Settings → Accessibility → Read &amp; Speak → voice menu → Manage Voices</b>. Download an English voice marked Enhanced or Premium. Then rerun the voice inventory and select its exact identifier; never silently fall back to compact Samantha.</p></section>
        <section class="panel"><h2>Canonical embedded XML</h2><pre class="code">${xml}</pre></section>
      </main>`}
    }
    customElements.define("apple-speech-research",AppleSpeechResearch);
  </script>
