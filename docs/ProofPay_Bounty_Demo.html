<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="ProofPay Hedera x402 bounty video presentation.">
  <title>ProofPay — Hedera x402 Demo</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--bg:#05070a;--panel:#10161c;--line:#2c3742;--text:#f5f1e8;--muted:#aab2b8;--green:#63e0b5;--gold:#f2c665;--orange:#ff7a34;--red:#ef3155;--blue:#73bfff}
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text)}
    proofpay-video:not(:defined){display:grid;place-items:center;width:100%;height:100%}
  </style>
</head>
<body>
  <proofpay-video>Loading ProofPay demo…</proofpay-video>
  <script type="module">
    import {LitElement,html,css} from "https://unpkg.com/lit@3/index.js?module";

    const tx="0.0.7162784-1784665192-906989595";
    const payer="0.0.9676074";
    const seller="0.0.9676073";
    const feePayer="0.0.7162784";
    const scenes=[
      {k:"title",eyebrow:"PRERECORDED EVIDENCE WALKTHROUGH · HEDERA x402 BOUNTY",title:"ProofPay",subtitle:"A real testnet payment completed 21 July 2026. No new payment executes during playback.",chips:["REAL TESTNET PAYMENT","HBAR","HTTP 402","Signed evidence receipts"]},
      {k:"problem",eyebrow:"THE MISSING LINK",title:"A payment proves value moved.",subtitle:"It does not prove what the API delivered.",split:[["ON-CHAIN PAYMENT","payer · seller · amount · timestamp"],["DELIVERED ARTIFACT","request · evidence · output · provenance"]],footer:"ProofPay cryptographically binds both sides."},
      {k:"flow",eyebrow:"END-TO-END ARCHITECTURE",title:"One discrete request. One payment. One verified response.",flow:["Codex agent","HTTP 402","Blocky402","Hedera testnet","Evidence unlock","Signed receipt"]},
      {k:"terminal",eyebrow:"1 · COMPLETED AUTONOMOUS PURCHASE · 21 JUL 2026",title:"Reconstruction from the committed proof bundle",lines:[
        "> npm run demo:keyvault",
        "1/5 Discovering ProofPay catalog",
        "2/5 Creating a single-use MSTR evidence quote",
        "    amount=1000001 tinybar",
        "3/5 Paying HTTP 402 on Hedera testnet",
        `    value_buyer=${payer}  seller=${seller}`,
        `    transaction_fee_payer=${feePayer}`,
        `    transaction=${tx}`
      ],note:"Recorded-run values come from the committed proof bundle. Private signing keys are never printed."},
      {k:"settle",eyebrow:"2 · HEDERA SETTLEMENT",title:"The buyer authorizes value. The facilitator sponsors the fee.",ledger:[
        ["Buyer","Signs the exact transfer"],
        ["Blocky402","Verifies, co-signs and pays the network fee"],
        ["Hedera","Reaches consensus and returns the transaction ID"],
        ["ProofPay","Releases evidence only after confirmed settlement"]
      ]},
      {k:"terminal",eyebrow:"3 · RECORDED EVIDENCE UNLOCK",title:"The performed settlement unlocked DeltaSignal evidence.",lines:[
        "4/5 Mirror-verifying settlement and unlocking the evidence",
        "5/5 Independently verifying and writing the proof bundle",
        `    Value buyer: ${payer}  →  Seller: ${seller}`,
        `    Fee payer: ${feePayer}`,
        `    Transaction: ${tx}`,
        "    Evidence: MSTR 10-K 2025-12-31",
        "    Receipt: pprec_91b33c408f6649f5b150068fe50a7c86",
        "PASS: payment, delivery, provenance, and signatures are bound."
      ],note:"Public evidence: docs/evidence/proof-bundle-2026-07-21.json · independently verifiable offline."},
      {k:"hashscan",eyebrow:"4 · MIRROR-NODE + HASHSCAN PROOF",title:"The completed Hedera testnet payment",tx,stats:[["VALUE BUYER",payer],["SELLER",seller],["FEE PAYER",feePayer],["RESULT","SUCCESS"],["AMOUNT","1,000,001 tinybar"],["CONSENSUS","1784665197.689086104"]]},
      {k:"verify",eyebrow:"5 · INDEPENDENT VERIFICATION",title:"Sixteen checks. Zero trust in the bundle itself.",checks:["Trusted signer","Receipt signature","Quote binding","Payment terms","Request hash","Ciphertext hash","Artifact decrypts","Output hash","Evidence hash","Source date","Settlement claims","Replay protection"],result:"16 / 16 PASS"},
      {k:"tamper",eyebrow:"6 · FAIL-CLOSED INTEGRITY",title:"Change one field. Verification fails.",terminal:["Original bundle: PASS","Tamper action: changed decrypted artifact ticker","Tampered bundle: REJECTED","artifact_canonical · evidence_hash"],result:"MUTATION DETECTED"},
      {k:"value",eyebrow:"DURABLE DELTASIGNAL VALUE",title:"Pay per evidence—not per subscription.",cards:[
        ["Autonomous","Agents buy only the research they need."],
        ["Auditable","Payment is bound to request and response."],
        ["Composable","The same receipt model supports every payment rail."],
        ["Demonstrated proof","This delivery has HashScan plus a portable verification bundle."]
      ],footer:"No API key · No checkout · No human in the loop"},
      {k:"thanks",eyebrow:"PUBLIC SOURCE · PERFORMED SETTLEMENT · VERIFIABLE DELIVERY",title:"Thank you!",subtitle:"ProofPay — Hedera x402 evidence receipts",links:["github.com/aitrailblazer/proofpay-hedera-x402",`hashscan.io/testnet/transaction/${tx}`]}
    ];

    class ProofPayVideo extends LitElement{
      static styles=css`
        :host{display:block;width:100vw;height:100vh;background:radial-gradient(circle at 12% 0,rgba(99,224,181,.12),transparent 32%),radial-gradient(circle at 90% 10%,rgba(242,198,101,.10),transparent 28%),#05070a}
        *,*::before,*::after{box-sizing:border-box}.frame{position:relative;width:100%;height:100%;padding:6.2vh 6.5vw 7vh;display:flex;flex-direction:column;overflow:hidden}
        .sceneArtLayer{position:absolute;inset:0;z-index:0;pointer-events:none}.sceneArt{position:absolute;right:-1vw;top:11vh;width:43vw;height:78vh;object-fit:contain;opacity:.78;filter:saturate(.92) contrast(1.06) drop-shadow(0 2vh 5vh #000b)}
        .sceneArtLayer::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,#05070a 0%,#05070af7 39%,#05070aba 57%,#05070a16 86%,#05070a80 100%)}
        .content{position:relative;z-index:2;width:61vw}.watermark,.copyright{z-index:3}
        .titleFrame .sceneArt,.thanksFrame .sceneArt{right:1.5vw;top:8vh;width:49vw;height:84vh;opacity:.82}.titleFrame .sceneArtLayer::after,.thanksFrame .sceneArtLayer::after{background:linear-gradient(90deg,#05070a 0%,#05070af8 38%,#05070ab5 56%,#05070a16 88%,#05070a62 100%)}
        .watermark{position:absolute;right:3vw;top:3vh;display:flex;align-items:center;gap:.7vw;color:#c7c5bd;font-size:1vw;letter-spacing:.03em;opacity:.82}
        .watermark img{width:3.3vw;height:3.3vw;object-fit:contain}.copyright{position:absolute;left:3vw;top:3.2vh;color:#777f85;font-size:.72vw;letter-spacing:.04em}
        .eyebrow{font-size:1vw;font-weight:850;letter-spacing:.19em;color:var(--green);margin-bottom:1.8vh}.title{font-size:4.15vw;line-height:1.02;letter-spacing:-.05em;font-weight:900;max-width:82vw;margin:0}
        .subtitle{font-size:1.55vw;color:var(--muted);margin-top:2vh;max-width:56vw;line-height:1.35}.content{flex:1;display:flex;flex-direction:column;justify-content:center}
        .chips{display:flex;gap:.8vw;margin-top:4vh}.chip{border:1px solid #38444d;border-radius:999px;padding:.75vh 1.1vw;color:#d7ddd8;font-size:.9vw;background:#0c1217}
        .titleScene{align-items:flex-start;text-align:left;justify-content:center}.heroLogo{width:9vw;height:9vw;object-fit:contain;margin-bottom:1.8vh;filter:drop-shadow(0 1.5vh 4vh rgba(239,49,85,.2))}
        .titleScene .title{font-size:5.6vw}.titleScene .subtitle{font-size:1.65vw;max-width:45vw}.titleScene .chips{justify-content:flex-start;flex-wrap:wrap;max-width:48vw}.notice{margin-top:3vh;color:#8f969b;font-size:.75vw}
        .split{display:grid;grid-template-columns:1fr 1fr;gap:2vw;margin-top:5vh}.splitCard,.card{border:1px solid var(--line);background:rgba(16,22,28,.92);border-radius:1.1vw;padding:2vw}
        .splitCard b{display:block;color:var(--gold);font-size:1vw;letter-spacing:.1em;margin-bottom:1.4vh}.splitCard span{font-size:1.5vw;color:#dce1dc}.footer{margin-top:3vh;color:var(--green);font-size:1.4vw;font-weight:800}
        .flow{display:grid;grid-template-columns:repeat(3,1fr);gap:.8vw;margin-top:4vh}.node{position:relative;display:grid;place-items:center;min-height:10vh;padding:1vw;text-align:center;border:1px solid #3c4a54;border-radius:.8vw;background:#0e171ded;font-size:1.1vw;font-weight:800}
        .node::before{content:counter(flow);counter-increment:flow;color:var(--gold);margin-right:.5vw}.flow{counter-reset:flow}
        .terminal{margin-top:3vh;border:1px solid #34414a;border-radius:1vw;background:#030608eF;overflow:hidden;box-shadow:0 2vh 6vh #0008}.bar{height:3.5vh;background:#121920;display:flex;align-items:center;gap:.45vw;padding:0 1vw}.dot{width:.55vw;height:.55vw;border-radius:50%;background:#59636a}.dot:first-child{background:#ff6f78}.dot:nth-child(2){background:#ffbd66}.dot:nth-child(3){background:#64e0b6}
        pre{margin:0;padding:1.5vw;color:#d6efdf;font:700 1.03vw/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap}.note{margin-top:1.5vh;border-left:.3vw solid var(--gold);padding:1vh 1vw;background:#1b170eef;color:#e7cf9d;font-size:.9vw}
        .ledger{display:grid;grid-template-columns:1fr 1fr;gap:1vw;margin-top:4vh}.ledgerRow{display:grid;grid-template-columns:9vw 1fr;align-items:center;border:1px solid var(--line);border-radius:.8vw;padding:1.4vw;background:#0e151b}.ledgerRow b{color:var(--gold);font-size:1.1vw}.ledgerRow span{font-size:1.15vw;color:#cbd1d2}
        .tx{font:850 2vw ui-monospace;color:var(--gold);margin-top:3vh;padding:1.4vw;border:1px solid #5b4c28;background:#1c180e;border-radius:.8vw}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:.7vw;margin-top:2vh}.stat{border:1px solid var(--line);border-radius:.7vw;padding:1vw;background:#0e151b}.stat span{display:block;color:#89939a;font-size:.66vw;letter-spacing:.08em}.stat b{display:block;margin-top:.7vh;font:800 .88vw ui-monospace;color:#e5ebe6}.stat:first-child b{color:var(--green)}
        .checks{display:grid;grid-template-columns:repeat(3,1fr);gap:.65vw;margin-top:3vh}.check{border:1px solid #2e4f45;border-radius:.65vw;background:#0b1b16eb;padding:.8vw;font-size:.9vw;color:#d8e9df}.check::before{content:"✓";color:var(--green);font-weight:900;margin-right:.5vw}.result{align-self:flex-end;margin-top:2vh;font:900 2.5vw ui-monospace;color:var(--green)}
        .tamper{margin-top:4vh;display:grid;grid-template-columns:1.4fr .6fr;gap:2vw;align-items:center}.tamper .terminal{margin:0}.reject{border:1px solid #74313f;border-radius:1vw;background:#241017;padding:2vw;text-align:center;color:var(--red);font:900 1.8vw ui-monospace}
        .cards{display:grid;grid-template-columns:1fr 1fr;gap:1vw;margin-top:4vh}.card b{display:block;color:var(--gold);font-size:1.25vw;margin-bottom:.8vh}.card span{color:#c4cbcd;font-size:1.08vw}
        .thanks{align-items:flex-start;text-align:left;justify-content:center}.thanks .heroLogo{width:8vw;height:8vw}.thanks .title{font-size:5.5vw}.links{margin-top:3vh;display:grid;gap:.8vh;color:#aab4ba;font:700 .9vw ui-monospace}
        .action{position:relative;transition:filter .2s,transform .2s,background .2s,border-color .2s,opacity .2s}
        .action:not(.active){opacity:.68}.action.active{opacity:1;filter:brightness(1.22) drop-shadow(0 0 1.2vw rgba(99,224,181,.34));transform:scale(1.018);border-color:var(--green)!important;background-color:rgba(18,48,40,.96)!important;z-index:4}
        .action.active::after{content:"NOW";position:absolute;right:.7vw;top:.55vh;padding:.28vh .48vw;border-radius:999px;background:var(--green);color:#05100d;font:900 .55vw ui-monospace;letter-spacing:.1em}
        .title.action.active,.subtitle.action.active,.footer.action.active,.result.action.active,.links.action.active{transform:none;background:transparent!important;border-color:transparent!important}
        .title.action.active::after,.subtitle.action.active::after,.footer.action.active::after,.result.action.active::after,.links.action.active::after{right:auto;left:100%;top:50%;transform:translate(.8vw,-50%)}
        .terminalLines{margin:0;padding:1.5vw;color:#d6efdf;font:700 1.03vw/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap}
        .terminalLine{position:relative;min-height:1.5em;border-radius:.35vw;padding:0 .35vw;margin-left:-.35vw}.terminalLine.action.active::after{right:.35vw;top:.2em}
        .activeGroup{border:1px solid var(--green);border-radius:.8vw;box-shadow:0 0 1.4vw rgba(99,224,181,.22)}
      `;
      render(){
        const params=new URLSearchParams(location.search);
        const i=Math.max(0,Math.min(scenes.length-1,Number(params.get("scene")||0))),s=scenes[i];
        const p=Math.max(-1,Number(params.get("phrase")??-1));
        const on=(...indices)=>indices.includes(p)?"action active":"action";
        const flowActive=(index)=>[null,0,1,0,2,3,4,5][p]===index;
        const terminalPhrase=(line)=>i===5?(line<5?0:line===5?1:2):(line===0?0:line<3?1:line<5?2:line<7?3:4);
        const art=`../img/Scene${String(i+1).padStart(2,"0")}.jpg`;
        return html`<main class="frame ${s.k==="title"?"titleFrame":""} ${s.k==="thanks"?"thanksFrame":""}">
          <div class="sceneArtLayer"><img class="sceneArt" src=${art} alt=""></div>
          ${s.k!=="title"&&s.k!=="thanks"?html`<div class="watermark"><img src="./assets/deltasignal-logo.png" alt=""><span>DeltaSignal © 2026</span></div>`:""}
          <div class="content ${s.k==="title"?"titleScene":""} ${s.k==="thanks"?"thanks":""}">
            ${s.k==="title"?html`<img class="heroLogo" src="./assets/deltasignal-logo.png" alt="DeltaSignal logo"><div class="eyebrow">${s.eyebrow}</div><h1 class="title ${on(0)}">${s.title}</h1><div class="subtitle ${on(1,2,3)}">${s.subtitle}</div><div class="chips">${s.chips.map(x=>html`<span class="chip">${x}</span>`)}</div><div class="notice">DeltaSignal logo and visual identity © 2026 DeltaSignal. All rights reserved.</div>`:""}
            ${s.k==="problem"?html`<div class="eyebrow">${s.eyebrow}</div><h1 class="title ${on(0)}">${s.title}</h1><div class="subtitle ${on(1)}">${s.subtitle}</div><div class="split">${s.split.map((x,j)=>html`<div class="splitCard ${on(j===0?0:1)}"><b>${x[0]}</b><span>${x[1]}</span></div>`)}</div><div class="footer ${on(2,3)}">${s.footer}</div>`:""}
            ${s.k==="flow"?html`<div class="eyebrow">${s.eyebrow}</div><h1 class="title ${on(0)}">${s.title}</h1><div class="flow">${s.flow.map((x,j)=>html`<div class="node action ${flowActive(j)?"active":""}">${x}</div>`)}</div>`:""}
            ${s.k==="terminal"?html`<div class="eyebrow">${s.eyebrow}</div><h1 class="title ${on(0)}">${s.title}</h1><div class="terminal"><div class="bar"><i class="dot"></i><i class="dot"></i><i class="dot"></i></div><div class="terminalLines">${s.lines.map((x,j)=>html`<div class="terminalLine ${on(terminalPhrase(j))}">${x}</div>`)}</div></div><div class="note ${on(i===5?2:4)}">${s.note}</div>`:""}
            ${s.k==="settle"?html`<div class="eyebrow">${s.eyebrow}</div><h1 class="title ${on(0)}">${s.title}</h1><div class="ledger">${s.ledger.map((x,j)=>html`<div class="ledgerRow ${on(j===0?1:j===1?2:j===2?0:3)}"><b>${x[0]}</b><span>${x[1]}</span></div>`)}</div>`:""}
            ${s.k==="hashscan"?html`<div class="eyebrow">${s.eyebrow}</div><h1 class="title ${on(0)}">${s.title}</h1><div class="tx ${on(1)}">${s.tx}</div><div class="stats ${p===2?"activeGroup":""}">${s.stats.map(x=>html`<div class="stat ${on(2)}"><span>${x[0]}</span><b>${x[1]}</b></div>`)}</div><div class="footer ${on(1)}">hashscan.io/testnet/transaction/${s.tx}</div>`:""}
            ${s.k==="verify"?html`<div class="eyebrow">${s.eyebrow}</div><h1 class="title ${on(0,1)}">${s.title}</h1><div class="checks ${p===2?"activeGroup":""}">${s.checks.map(x=>html`<div class="check ${on(2)}">${x}</div>`)}</div><div class="result ${on(3)}">${s.result}</div>`:""}
            ${s.k==="tamper"?html`<div class="eyebrow">${s.eyebrow}</div><h1 class="title ${on(0)}">${s.title}</h1><div class="tamper"><div class="terminal"><div class="bar"><i class="dot"></i><i class="dot"></i><i class="dot"></i></div><div class="terminalLines">${s.terminal.map((x,j)=>html`<div class="terminalLine ${on(j===0?0:j===1?1:j===3?2:3)}">${x}</div>`)}</div></div><div class="reject ${on(3)}">${s.result}</div></div>`:""}
            ${s.k==="value"?html`<div class="eyebrow">${s.eyebrow}</div><h1 class="title ${on(0)}">${s.title}</h1><div class="cards">${s.cards.map((x,j)=>html`<div class="card ${on(j===0?1:2)}"><b>${x[0]}</b><span>${x[1]}</span></div>`)}</div><div class="footer ${on(2)}">${s.footer}</div>`:""}
            ${s.k==="thanks"?html`<img class="heroLogo" src="./assets/deltasignal-logo.png" alt="DeltaSignal logo"><div class="eyebrow">${s.eyebrow}</div><h1 class="title ${on(0)}">${s.title}</h1><div class="subtitle ${on(3)}">${s.subtitle}</div><div class="links ${on(1,2)}">${s.links.map(x=>html`<div>${x}</div>`)}</div><div class="notice">DeltaSignal logo and visual identity © 2026 DeltaSignal. All rights reserved.</div>`:""}
          </div>
          ${s.k!=="title"&&s.k!=="thanks"?html`<div class="copyright">DeltaSignal logo and visual identity © 2026 DeltaSignal. All rights reserved.</div>`:""}
        </main>`;
      }
    }
    customElements.define("proofpay-video",ProofPayVideo);
  </script>
</body>
</html>
